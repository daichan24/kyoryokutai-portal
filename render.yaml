services:
  # バックエンド（Docker: Chromium 入りで PDF 生成が動作）
  - type: web
    name: kyoryokutai-backend
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: EMAIL_ENABLED
        value: false
      - key: EMAIL_PROVIDER
        value: console
      - key: EMAIL_FROM
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # フロントエンド（Static Site）
  - type: static_site
    name: kyoryokutai-frontend
    rootDir: frontend
    buildCommand: rm -rf node_modules dist .vite && npm install --legacy-peer-deps && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
